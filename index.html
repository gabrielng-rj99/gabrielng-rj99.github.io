<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
        />
        <meta
            name="description"
            content="Gabriel Gomes — End-to-End Software Engineer. Portfolio showcasing projects across DevSecOps, full-stack development, and data engineering."
        />
        <meta name="author" content="Gabriel Gomes" />
        <meta name="theme-color" content="#9f00ff" />

        <!-- Blocking script to set theme before React hydrates -->
        <script>
            (function() {
                const STORAGE_KEY = "portfolio-theme";
                const stored = localStorage.getItem(STORAGE_KEY);
                const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                const theme = stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
                document.documentElement.classList.add(theme);
            })();
        </script>

        <title>Gabriel Gomes | Software Engineer</title>

        <link
            rel="icon"
            type="image/svg+xml"
            href="/assets/logo/EngenHumanas.svg"
        />

        <!-- Poppins Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
